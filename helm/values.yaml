namespace:
  name: moonpay-prod
  environment: prod
  app: moonpay

app:
  name: moonpay-app
  replicaCount: 2
  image:
    repository: gcr.io/moonpay-playground/devops-challenge
    tag: latest
    pullPolicy: Always
  port: 3000
  # K8s secret created by the deploy workflow from GCP Secret Manager.
  # All keys in this secret are injected as env vars into the app container.
  secretName: moonpay-app-secrets
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

